# Phase 9 — local enterprise stack.
version: "3.9"
services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://lawrence:lawrence@postgres:5432/lawrence
      APP_BASE_URL: http://localhost:3000
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-dev-only-change-me}
      LAWRENCE_ALLOW_MOCK_MODEL: "1"
    depends_on:
      - postgres
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: lawrence
      POSTGRES_PASSWORD: lawrence
      POSTGRES_DB: lawrence
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  # Optional object storage (MinIO) — uncomment if STORAGE_PROVIDER=s3
  # minio:
  #   image: minio/minio
  #   command: server /data --console-address ":9001"
  #   ports: ["9000:9000", "9001:9001"]
volumes:
  pgdata:
