name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci || npm install
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint --if-present
      - name: Unit tests
        run: npm test
      - name: Integration tests (memory backend)
        run: node --import tsx --test --test-concurrency=1 tests/integration/**/*.test.ts
      - name: Preflight (mock model allowed)
        run: npx tsx scripts/preflight.ts
        env:
          APP_BASE_URL: http://localhost:3000
          ENCRYPTION_KEY: ci-only
          LAWRENCE_ALLOW_MOCK_MODEL: "1"
      - name: Build
        run: npm run build
