name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci || npm install
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        # next lint prompts interactively when no ESLint config is present, which
        # fails in CI. Run it only when a config exists; otherwise skip cleanly.
        run: |
          if [ -f .eslintrc.json ] || [ -f .eslintrc.js ] || [ -f .eslintrc ] || [ -f eslint.config.js ] || [ -f eslint.config.mjs ]; then
            npx next lint
          else
            echo "No ESLint config present — skipping lint."
          fi
      - name: Unit tests
        shell: bash
        run: |
          shopt -s globstar
          node --import tsx --test tests/unit/**/*.test.ts
      - name: Integration tests (memory backend)
        shell: bash
        run: |
          shopt -s globstar
          node --import tsx --test --test-concurrency=1 tests/integration/**/*.test.ts
      - name: Preflight (mock model allowed)
        run: npx tsx scripts/preflight.ts
        env:
          APP_BASE_URL: http://localhost:3000
          ENCRYPTION_KEY: ci-only
          LAWRENCE_ALLOW_MOCK_MODEL: "1"
      - name: Build
        run: npm run build

  # Postgres-backed verification: the runtime against real Postgres, plus the
  # two-role row-level-security model (privileged setup + non-superuser app role).
  postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lawrence_ci
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 12
    env:
      PGPASSWORD: postgres
      LAWRENCE_ALLOW_MOCK_MODEL: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci || npm install
      - name: Create non-superuser app role
        run: |
          psql -h localhost -U postgres -d lawrence_ci \
            -c "create role lawrence_app login password 'app' nosuperuser nobypassrls;" \
            -c "grant usage on schema public to lawrence_app;"
      - name: Provision runtime schema + RLS (privileged owner)
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/lawrence_ci
          LAWRENCE_DB_APP_ROLE: lawrence_app
        run: npx tsx scripts/setup-runtime-rls.ts
      - name: PG-backed runtime test (owner)
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/lawrence_ci
        run: node --import tsx --test tests/integration/pg-store.test.ts
      - name: RLS tenant-isolation test (non-superuser app role)
        env:
          DATABASE_URL: postgres://lawrence_app:app@localhost:5432/lawrence_ci
          LAWRENCE_DB_MANAGED_SCHEMA: "1"
          RLS_TEST: "1"
        run: node --import tsx --test tests/integration/rls-tenant-isolation.test.ts
