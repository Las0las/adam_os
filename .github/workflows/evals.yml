name: Evals
on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:
jobs:
  evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: npm }
      - run: npm ci || npm install
      - name: Run eval-related tests (retrieval/extraction/response/recommendation)
        run: node --import tsx --test tests/unit/eval-metrics.test.ts tests/unit/retrieval-eval-runner.test.ts tests/unit/extraction-eval-runner.test.ts tests/unit/response-eval-runner.test.ts
      - name: Run eval suite integration
        run: node --import tsx --test --test-concurrency=1 tests/integration/retrieval-eval-suite-runs.test.ts tests/integration/eval-regression-creates-learning-signal.test.ts
      # A regression fails the job, blocking the release gate.
