name: platform-ci

# CI for the LAWRENCE Platform monorepo (Phase 0+). Scoped to platform/** so it
# is independent of the existing application CI at the repo root.
on:
  push:
    branches: [main]
    paths: ["platform/**", ".github/workflows/platform-ci.yml"]
  pull_request:
    paths: ["platform/**", ".github/workflows/platform-ci.yml"]

defaults:
  run:
    working-directory: platform

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.34.3

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: platform/pnpm-lock.yaml

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Lint (incl. architectural layer rules)
        run: pnpm lint

      - name: Typecheck (strict)
        run: pnpm typecheck

      - name: Test (contract + constitutional harness)
        run: pnpm test

      - name: Build
        run: pnpm build
